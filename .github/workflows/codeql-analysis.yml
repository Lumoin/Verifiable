name: "Verifiable CodeQL analysis"

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  # pull_request:
  #  branches:
  #    - main
  #  paths-ignore:
  #    - "**.md"
  schedule:
  # A daily build to check all is still functioning.
  - cron: "0 0 * * *"

jobs:
  analyze:
    name: CodeQL Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a
      with:
        languages: 'csharp'
        build-mode: none
        queries: security-and-quality

    - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68
      with:
        global-json-file: global.json

    - name: Autobuild
      if: ${{ github.actor != 'dependabot[bot]' }}
      uses: github/codeql-action/autobuild@7188fc363630916deb702c7fdcf4e481b751f97a

    - name: CodeQL Analysis
      if: ${{ github.actor != 'dependabot[bot]' }}
      uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1
      timeout-minutes: 100
