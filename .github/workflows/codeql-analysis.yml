name: "Verifiable CodeQL analysis"

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
  # pull_request:
  #  branches:
  #    - main
  #  paths-ignore:
  #    - "**.md"
  schedule:
  # A daily build to check all is still functioning.
  - cron: "0 0 * * *"

jobs:
  analyze:
    name: CodeQL Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81
      with:
        languages: 'csharp'
        build-mode: none
        queries: security-and-quality

    - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68
      with:
        global-json-file: global.json

    - name: Autobuild
      if: ${{ github.actor != 'dependabot[bot]' }}
      uses: github/codeql-action/autobuild@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81

    - name: CodeQL Analysis
      if: ${{ github.actor != 'dependabot[bot]' }}
      uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81
      timeout-minutes: 100
